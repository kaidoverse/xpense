<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Sign Up - Xpense</title>
    <script>
      (() => {
        const modeKey = "xpense-theme-mode";
        const cookieName = "xpense_theme_mode";
        const isValid = value => value === "light" || value === "dark" || value === "system";
        const readCookie = name => {
          const prefix = name + "=";
          const parts = document.cookie.split(";").map(item => item.trim());
          const match = parts.find(item => item.startsWith(prefix));
          return match ? decodeURIComponent(match.slice(prefix.length)) : null;
        };
        let mode = "system";
        try {
          const stored = window.localStorage.getItem(modeKey);
          if (isValid(stored)) mode = stored;
        } catch {}
        if (mode === "system") {
          const cookieMode = readCookie(cookieName);
          if (isValid(cookieMode)) mode = cookieMode;
        }
        const theme =
          mode === "light" || mode === "dark"
            ? mode
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        const root = document.documentElement;
        root.setAttribute("data-theme", theme);
        root.style.backgroundColor = theme === "dark" ? "#0f1720" : "#f3f5f7";
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page" data-auth-mode="signup">
    <main class="auth-layout">
      <section class="auth-panel auth-panel--left">
        <div class="auth-brand">
          <span class="brand__dot"></span>
          <span class="brand__text">Xpense</span>
        </div>
        <h1 class="auth-hero-title">
          Build better money habits from your very first log.
        </h1>
        <p class="auth-hero-copy">
          Create your account and start tracking transactions in minutes.
        </p>
      </section>

      <section class="auth-panel auth-panel--right">
        <form class="auth-form" aria-label="Sign up form">
          <h2>Create your account</h2>
          <label class="auth-label" for="auth-email">Email</label>
          <input
            class="auth-input"
            id="auth-email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="Enter your email address"
            required
          />

          <label class="auth-label" for="auth-password">Password</label>
          <input
            class="auth-input"
            id="auth-password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="Create a password"
            required
          />

          <button class="auth-submit" type="submit">Create account</button>
          <p class="auth-switch">
            Already have an account? <a href="login.html">Sign In</a>
          </p>
        </form>
      </section>
    </main>

    <script src="firebase-config.local.js"></script>
    <script src="page-transition.js"></script>
    <script type="module" src="auth-page.js"></script>
  </body>
</html>
