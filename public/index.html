<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xpense</title>
    <script>
      (() => {
        const modeKey = "xpense-theme-mode";
        const cookieName = "xpense_theme_mode";
        const isValid = value => value === "light" || value === "dark" || value === "system";
        const readCookie = name => {
          const prefix = name + "=";
          const parts = document.cookie.split(";").map(item => item.trim());
          const match = parts.find(item => item.startsWith(prefix));
          return match ? decodeURIComponent(match.slice(prefix.length)) : null;
        };
        let mode = "system";
        try {
          const stored = window.localStorage.getItem(modeKey);
          if (isValid(stored)) mode = stored;
        } catch {}
        if (mode === "system") {
          const cookieMode = readCookie(cookieName);
          if (isValid(cookieMode)) mode = cookieMode;
        }
        const theme =
          mode === "light" || mode === "dark"
            ? mode
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        const root = document.documentElement;
        root.setAttribute("data-theme", theme);
        root.style.backgroundColor = theme === "dark" ? "#0f1720" : "#f3f5f7";
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="landing">
    <nav class="topbar">
      <div class="brand">
        <span class="brand__dot"></span>
        <span class="brand__text">Xpense</span>
      </div>
      <a class="login__btn" href="login.html">Sign in</a>
    </nav>

    <main class="landing__hero">
      <div class="landing__copy">
        <p class="landing__eyebrow">Personal finance, simplified</p>
        <h1>Track every expense. Own your money.</h1>
        <p class="landing__lead">
          Xpense helps you log income, control spending, and see a clear
          summary of where your money goes.
        </p>
        <div class="landing__actions">
          <a class="login__btn" href="signup.html">Get started</a>
          <a class="login__btn login__btn--secondary" href="login.html">
            I already have an account
          </a>
        </div>
      </div>
      <div class="landing__card">
        <div class="landing__stat">
          <span class="landing__stat-label">Monthly net</span>
          <span class="landing__stat-value">$2,420</span>
        </div>
        <div class="landing__stat">
          <span class="landing__stat-label">Top category</span>
          <span class="landing__stat-value">Food & dining</span>
        </div>
        <div class="landing__stat">
          <span class="landing__stat-label">Upcoming bills</span>
          <span class="landing__stat-value">3 this week</span>
        </div>
      </div>
    </main>

    <script src="firebase-config.local.js"></script>
    <script src="page-transition.js"></script>
    <script type="module" src="landing.js"></script>
  </body>
</html>
